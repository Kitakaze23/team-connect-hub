script: |
  set -e

  echo "🚀 START DEPLOY"

  cd /root/team-connect-hub || exit

  echo "📥 Updating code"
  git reset --hard
  git pull origin main

  echo "📦 Installing dependencies"
  npm install

  echo "🏗 Building project"
  npm run build

  echo "🧹 Cleaning nginx folder"
  rm -rf /var/www/teamhub/*

  echo "📤 Copying new build"
  cp -r dist/* /var/www/teamhub/

  echo "🔐 Fix permissions"
  chown -R www-data:www-data /var/www/teamhub
  chmod -R 755 /var/www/teamhub

  echo "🔄 Reload nginx"
  systemctl reload nginx

  echo "✅ DEPLOY DONE"
