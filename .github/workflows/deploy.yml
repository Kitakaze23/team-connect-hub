name: Deploy Frontend

on:
  push:
    branches:
      - main  # если у тебя ветка master, поменяй на master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Connect and deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo "🚀 START DEPLOY"

            cd /root/team-connect-hub || exit

            echo "📥 Updating code"
            git reset --hard
            git pull origin main

            echo "📦 Installing dependencies"
            npm install

            echo "🏗 Building project"
            npm run build

            echo "🔄 Reload nginx"
            systemctl reload nginx

            echo "✅ DEPLOY DONE"
