name: Deploy Frontend  # Название workflow

on:
  push:
    branches:
      - main  # Запускать деплой при пуше в main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Connect and deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            echo "🚀 START DEPLOY"

            cd /root/team-connect-hub || exit

            echo "📥 Updating code"
            git reset --hard
            git pull origin main

            echo "📦 Installing dependencies"
            npm install

            echo "🏗 Building project"
            npm run build

            echo "🧹 Cleaning nginx folder"
            rm -rf /var/www/teamhub/*

            echo "📤 Copying new build"
            cp -r dist/* /var/www/teamhub/

            echo "🔐 Fix permissions"
            chown -R www-data:www-data /var/www/teamhub
            chmod -R 755 /var/www/teamhub

            echo "🔄 Reload nginx"
            systemctl reload nginx

            echo "✅ DEPLOY DONE"
